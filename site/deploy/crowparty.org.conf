# Crow Name Oracle — crowparty.org (HTTPS added by certbot --nginx)
server {
	server_name crowparty.org www.crowparty.org;

	root /home/kevin/crow-name-oracle/site;
	index index.html;
	client_max_body_size 64k;

	# HSTS — tell browsers to use HTTPS for a year (ignored over plain HTTP)
	add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

	# API + health -> Node backend
	location /api/ {
		add_header Cache-Control "no-store" always;
		add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
		proxy_pass http://127.0.0.1:8787;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_read_timeout 120s;
	}
	location = /healthz { proxy_pass http://127.0.0.1:8787; }

	# Never expose source, docs, server code (.env!), or roster data.
	# Negative lookahead keeps /.well-known reachable for ACME/certbot.
	location ^~ /server/  { return 404; }
	location ^~ /prompts/ { return 404; }
	location ^~ /data/    { return 404; }
	location ~ /\.(?!well-known) { return 404; }
	location ~* \.(md|service|toml)$ { return 404; }
	location = /LICENSE   { return 404; }

	location / {
		add_header Cache-Control "no-cache";
		add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
		try_files $uri $uri/ /index.html;
	}

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/crowparty.org/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/crowparty.org/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


}

server {
    if ($host = www.crowparty.org) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = crowparty.org) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


	listen 80;
	listen [::]:80;
	server_name crowparty.org www.crowparty.org;
    return 404; # managed by Certbot




}