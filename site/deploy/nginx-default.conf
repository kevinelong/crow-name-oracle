# Crow Name Oracle — nginx vhost (Alpine: /etc/nginx/http.d/default.conf)
#
# This is the DEFAULT server: it answers bare-IP / unknown-Host requests over
# HTTP. Other domains on the same box are matched by their Host header in their
# own vhost files and are completely unaffected by this block — so dropping the
# Oracle onto the server's public IP does not disturb existing sites.
#
# Pairs with the crow-oracle OpenRC service (Node backend on 127.0.0.1:8787).

server {
	listen 80 default_server;
	listen [::]:80 default_server;

	root /home/kevin/crow-name-oracle/site;
	index index.html;

	client_max_body_size 64k;

	# API + health -> Node backend (crow-oracle service on 127.0.0.1:8787)
	location /api/ {
		add_header Cache-Control "no-store" always;   # roster must never be cached stale
		proxy_pass http://127.0.0.1:8787;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_read_timeout 120s;
	}
	location = /healthz {
		proxy_pass http://127.0.0.1:8787;
	}

	# Never expose source, docs, server code (.env!), or roster data
	location ^~ /server/  { return 404; }
	location ^~ /prompts/ { return 404; }
	location ^~ /data/    { return 404; }
	location ~ /\.        { return 404; }
	location ~* \.(md|service|toml)$ { return 404; }
	location = /LICENSE   { return 404; }

	location / {
		add_header Cache-Control "no-cache";          # revalidate so updated JS reaches everyone
		try_files $uri $uri/ /index.html;
	}
}
